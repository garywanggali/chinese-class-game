<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>选择分组｜苏轼课堂对战</title>
    <link rel="stylesheet" href="/static/kahoot.css?v=1" />
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <h1>加入对战</h1>
          <div class="sub">先输入一个临时昵称，再选择你所在的大组。选好后会自动进入答题页面（下次打开也会记住）。</div>
        </div>
      </header>

      <section class="grid" style="grid-template-columns:1fr;">
        <div class="card">
          <div class="label">你的昵称（临时）</div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;">
            <input id="nickname" class="input" maxlength="20" placeholder="例如：小秦 / 12号 / Oliver…" />
            <button id="btnSave" class="btn primary" type="button">确认昵称</button>
          </div>
          <div class="label">请选择分组</div>
          <div class="btnGrid" style="grid-template-columns:1fr 1fr;">
            <button id="btnA" class="bigBtn" type="button">A<div class="bigBtnText">A 组</div></button>
            <button id="btnB" class="bigBtn" type="button">B<div class="bigBtnText">B 组</div></button>
          </div>
          <div id="hint" class="hint">提示：如果选错了，随时回到本页重新选择。</div>
        </div>
      </section>
    </div>

    <script>
      const teamKey = "kahoot_team_v1";
      const nickKey = "kahoot_nickname_v1";
      const tokenKey = "kahoot_token_v1";

      const nickInput = document.getElementById("nickname");
      const hint = document.getElementById("hint");
      const savedNick = sessionStorage.getItem(nickKey) || "";
      if (savedNick) nickInput.value = savedNick;

      async function join(team) {
        const nickname = (nickInput.value || "").trim();
        if (!nickname) {
          hint.textContent = "请先输入昵称。";
          return;
        }
        let token = sessionStorage.getItem(tokenKey);
        if (!token) {
          // token 只在“确认加入”时生成，避免学生只刷新页面就产生 token
          token = Math.random().toString(36).slice(2) + Date.now().toString(36);
          sessionStorage.setItem(tokenKey, token);
        }
        sessionStorage.setItem(nickKey, nickname);
        sessionStorage.setItem(teamKey, team);
        await fetch("/api/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ team, token, nickname }),
        });
        location.href = `/s/${team}`;
      }

      document.getElementById("btnSave").addEventListener("click", () => {
        const nickname = (nickInput.value || "").trim();
        if (!nickname) {
          hint.textContent = "请先输入昵称。";
          return;
        }
        sessionStorage.setItem(nickKey, nickname);
        hint.textContent = `昵称已保存：${nickname}（接下来选择 A/B 组）`;
      });
      // 不自动“重加入”。老师点清零后，若名单要清空，需要同学再手动点一次 A/B 并确认昵称。

      document.getElementById("btnA").addEventListener("click", () => {
        join("A");
      });
      document.getElementById("btnB").addEventListener("click", () => {
        join("B");
      });
    </script>
  </body>
</html>
